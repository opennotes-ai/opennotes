<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>YouTube - Video</title></head>
<body>
  <div id="primary">
    <div id="comments">
      <ytd-comments id="comments">
        <ytd-item-section-renderer>
          <ytd-comment-thread-renderer>
            <ytd-comment-replies-renderer>
              <div id="more-replies">
                <button aria-label="Show more replies">Show more replies</button>
              </div>
            </ytd-comment-replies-renderer>
          </ytd-comment-thread-renderer>
          <ytd-continuation-item-renderer>
            <button aria-label="Show more">Show more</button>
          </ytd-continuation-item-renderer>
          <ytd-comment-thread-renderer>
            <ytd-button-renderer id="more-replies">
              <button>View 5 replies</button>
            </ytd-button-renderer>
          </ytd-comment-thread-renderer>
          <tp-yt-paper-button id="more">Show more comments</tp-yt-paper-button>
        </ytd-item-section-renderer>
      </ytd-comments>
    </div>
  </div>
</body>
</html>
